spring:
  threads:
    virtual:
      enabled: true
  docker:
    compose:
      enabled: false  # 외부 SKU DB 사용 중 - Docker 로컬 DB 불필요
  thymeleaf:
    cache: false
  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true
  datasource:
    # SKU 공용 DB 서버 연결
    url: jdbc:sqlserver://211.232.94.161:1533;databaseName=SKUEDU;encrypt=true;trustServerCertificate=true;
    username: SKUEDU01
    password: init000!
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  sql:
    init:
      mode: never  # 최초 1회 실행 후 never로 되돌릴 것
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      encoding: UTF-8

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 30
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: INFO
    com.ees.eval: DEBUG

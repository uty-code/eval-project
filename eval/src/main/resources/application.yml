spring:
  threads:
    virtual:
      enabled: true
  docker:
    compose:
      enabled: true
      lifecycle-management: start_and_stop
  datasource:
    # URL, username, password는 Docker Compose가 실행될 때 자동으로 주입됩니다.
    # 수동 실행 시를 위해 기본값을 유지하거나 생략 가능합니다.
    url: jdbc:sqlserver://localhost:1433;databaseName=master;encrypt=true;trustServerCertificate=true;
    username: sa
    password: EesAdmin!2026
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      encoding: UTF-8

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 30
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: INFO
    com.ees.eval: DEBUG

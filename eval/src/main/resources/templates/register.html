<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사원 등록 신청 - EES 사원 평가 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.7s ease-out forwards; }
        .register-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .register-card {
            width: 100%;
            max-width: 560px;
        }
    </style>
</head>
<body class="login-container">

    <div class="register-wrapper">
        <div class="register-card glass-card p-5 animate-fade-in">

            <!-- 헤더 -->
            <div class="text-center mb-4">
                <div class="d-inline-flex bg-success bg-opacity-10 p-3 rounded-4 mb-3">
                    <i class="bi bi-person-plus-fill text-success fs-1"></i>
                </div>
                <h2 class="fw-bold text-white mb-1">사원 등록 신청</h2>
                <p class="text-muted small">신청 후 관리자 승인을 받아야 로그인이 가능합니다.</p>
            </div>

            <!-- 성공 메시지 -->
            <div th:if="${successMessage}"
                class="alert bg-success bg-opacity-10 border-success border-opacity-25 text-success small mb-4">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${successMessage}"></span>
                <div class="mt-2">
                    <a th:href="@{/login}" class="btn btn-sm btn-outline-success">로그인 페이지로 돌아가기</a>
                </div>
            </div>

            <!-- 오류 메시지 -->
            <div th:if="${errorMessage}"
                class="alert bg-danger bg-opacity-10 border-danger border-opacity-25 text-danger small mb-4">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <!-- 등록 신청 폼 -->
            <form th:action="@{/register}" method="post" class="text-start" id="register-form">

                <div class="row g-3">
                    <!-- 이름 -->
                    <div class="col-12">
                        <label for="name" class="form-label text-muted small px-1">이름 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-surface-light border-0 text-muted"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="name" name="name"
                                placeholder="홍길동" required maxlength="50">
                        </div>
                    </div>

                    <!-- 이메일 -->
                    <div class="col-12">
                        <label for="email" class="form-label text-muted small px-1">이메일 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-surface-light border-0 text-muted"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email"
                                placeholder="example@company.com" required maxlength="255">
                        </div>
                    </div>

                    <!-- 전화번호 -->
                    <div class="col-12">
                        <label for="phone" class="form-label text-muted small px-1">핸드폰 번호 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-surface-light border-0 text-muted"><i class="bi bi-telephone"></i></span>
                            <input type="text" class="form-control" id="phone" name="phone"
                                placeholder="010-0000-0000" required maxlength="13"
                                pattern="^010-\d{4}-\d{4}$">
                        </div>
                        <div class="form-text text-muted small px-1">형식: 010-XXXX-XXXX</div>
                    </div>

                    <!-- 부서 / 직급 -->
                    <div class="col-md-6">
                        <label for="deptId" class="form-label text-muted small px-1">부서 <span class="text-danger">*</span></label>
                        <select class="form-select" id="deptId" name="deptId" required>
                            <option value="">부서 선택</option>
                            <option th:each="dept : ${departments}"
                                    th:value="${dept.deptId()}"
                                    th:text="${dept.deptName()}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="positionId" class="form-label text-muted small px-1">직급 <span class="text-danger">*</span></label>
                        <select class="form-select" id="positionId" name="positionId" required>
                            <option value="">직급 선택</option>
                            <option th:each="pos : ${positions}"
                                    th:value="${pos.positionId()}"
                                    th:text="${pos.positionName()}">
                            </option>
                        </select>
                    </div>

                    <!-- 입사일 -->
                    <div class="col-12">
                        <label for="hireDate" class="form-label text-muted small px-1">입사일 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-surface-light border-0 text-muted"><i class="bi bi-calendar3"></i></span>
                            <input type="date" class="form-control" id="hireDate" name="hireDate" required>
                        </div>
                    </div>

                    <!-- 비밀번호 -->
                    <div class="col-md-6">
                        <label for="password" class="form-label text-muted small px-1">비밀번호 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-surface-light border-0 text-muted"><i class="bi bi-shield-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password"
                                placeholder="••••••••" required minlength="4">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="passwordConfirm" class="form-label text-muted small px-1">비밀번호 확인 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-surface-light border-0 text-muted"><i class="bi bi-shield-check"></i></span>
                            <input type="password" class="form-control" id="passwordConfirm" name="passwordConfirm"
                                placeholder="••••••••" required minlength="4">
                        </div>
                    </div>
                </div>

                <!-- 안내 박스 -->
                <div class="alert bg-primary bg-opacity-10 border-primary border-opacity-25 text-primary small mt-4 mb-4">
                    <i class="bi bi-info-circle-fill me-2"></i>
                    등록 신청 후 관리자가 승인하면 사번이 발급되어 로그인이 가능합니다.
                </div>

                <button type="submit" class="btn btn-success w-100 mb-3" id="btn-submit-register">
                    <i class="bi bi-send-fill me-2"></i>등록 신청하기
                </button>

                <div class="text-center">
                    <a th:href="@{/login}" class="text-muted text-decoration-none small">
                        <i class="bi bi-arrow-left me-1"></i>로그인 페이지로 돌아가기
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 전화번호 자동 하이픈
        document.getElementById('phone').addEventListener('input', function () {
            let val = this.value.replace(/\D/g, '');
            if (val.length > 3 && val.length <= 7) {
                val = val.slice(0, 3) + '-' + val.slice(3);
            } else if (val.length > 7) {
                val = val.slice(0, 3) + '-' + val.slice(3, 7) + '-' + val.slice(7, 11);
            }
            this.value = val;
        });

        // 비밀번호 확인
        document.getElementById('register-form').addEventListener('submit', function (e) {
            const pw = document.getElementById('password').value;
            const pwc = document.getElementById('passwordConfirm').value;
            if (pw !== pwc) {
                e.preventDefault();
                alert('비밀번호가 일치하지 않습니다.');
                document.getElementById('passwordConfirm').focus();
            }
        });
    </script>
</body>
</html>

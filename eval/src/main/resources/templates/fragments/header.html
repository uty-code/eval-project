<div th:fragment="header" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
                <i class="bi bi-rocket-takeoff-fill text-primary"></i>
                <span>EES ADMIN</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent" data-bs-theme="dark">
                <ul class="navbar-nav ms-auto align-items-center gap-3">
                    <li class="nav-item d-none d-md-block">
                        <span class="text-muted small"
                            th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm')}">2026-04-09</span>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" id="userDropdown"
                            role="button" data-bs-toggle="dropdown">
                            <div class="bg-primary rounded-circle d-flex align-items-center justify-content-center"
                                style="width: 32px; height: 32px;">
                                <i class="bi bi-person-fill text-white"></i>
                            </div>
                            <span sec:authentication="principal.username">Admin</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end glass-card border-0 mt-2 shadow-lg">
                            <li><a class="dropdown-item py-2" href="#"><i class="bi bi-person me-2"></i>내 프로필</a></li>
                            <li><a class="dropdown-item py-2" href="#"><i class="bi bi-gear me-2"></i>설정</a></li>
                            <li>
                                <hr class="dropdown-divider border-secondary opacity-25">
                            </li>
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <button type="submit" class="dropdown-item py-2 text-danger">
                                        <i class="bi bi-box-arrow-right me-2"></i>로그아웃
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="btn btn-primary btn-sm px-3" th:href="@{/login}">로그인</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>

<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content, activeMenu, extraStyles, extraScripts)" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">EES - 사원 평가 시스템</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <!-- Page Specific CSS -->
    <th:block th:replace="${extraStyles} ?: ~{}"></th:block>

    <style>
        /* Custom Tab System */
        .nav-tabs-custom {
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 2rem;
            display: flex;
            gap: 1.5rem;
        }

        .nav-link-custom {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            padding: 0.75rem 0.5rem;
            font-weight: 500;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: none;
            background: none;
        }

        .nav-link-custom:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .nav-link-custom.active {
            color: #fff;
        }

        .nav-link-custom.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.5);
        }

        .tab-badge {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            padding: 0.1rem 0.5rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* HTMX Loading Indicator */
        .htmx-indicator {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            z-index: 9999;
            overflow: hidden;
        }

        .htmx-indicator::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            animation: htmx-loading 1.5s infinite linear;
        }

        @keyframes htmx-loading {
            0% {
                left: -100%;
            }

            100% {
                left: 100%;
            }
        }

        .htmx-request .htmx-indicator {
            display: block;
        }

        .htmx-request.htmx-indicator {
            display: block;
        }
    </style>
</head>

<body class="bg-dark text-white">
    <!-- HTMX Global Loading Indicator -->
    <div class="htmx-indicator" id="global-loader"></div>

    <!-- Header Fragment -->
    <div th:replace="fragments/header :: header"></div>

    <div class="d-flex">
        <!-- Sidebar Fragment -->
        <div th:replace="fragments/sidebar :: sidebar(activeMenu=${activeMenu})"></div>

        <!-- Main Content -->
        <main class="main-wrapper flex-grow-1">
            <div th:replace="${content}">
                <!-- Page specific content will be injected here -->
            </div>
            <!-- Footer Fragment -->
            <div th:replace="fragments/footer :: footer"></div>
        </main>
    </div>

    <!-- Footer moved inside main-wrapper -->

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Page Specific Scripts -->
    <th:block th:replace="${extraScripts} ?: ~{}"></th:block>

    <!-- HTMX Sidebar Active State Manager -->
    <script>
        document.addEventListener('htmx:pushedIntoHistory', function (evt) {
            const newPath = evt.detail.path;
            document.querySelectorAll('.sidebar .nav-link').forEach(link => {
                link.classList.remove('active');
                const href = link.getAttribute('href');
                if (href !== '#' && href !== '/' && newPath.startsWith(href)) {
                    link.classList.add('active');
                } else if (href === '/' && newPath === '/') {
                    link.classList.add('active');
                }
            });
        });
    </script>
    <!-- 전역 알림 자동 닫기 스크립트 (4초 후 js-auto-dismiss 클래스 가진 alert 자동 닫기) -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.js-auto-dismiss').forEach(function (el) {
                setTimeout(function () {
                    const bsAlert = bootstrap.Alert.getOrCreateInstance(el);
                    if (bsAlert) bsAlert.close();
                }, 4000);
            });
        });
    </script>
</body>

</html>

<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content, activeMenu, extraStyles, extraScripts)" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">EES - 사원 평가 시스템</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <meta th:if="${_csrf}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf}" name="_csrf_header" th:content="${_csrf.headerName}"/>
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <!-- Page Specific CSS -->
    <th:block th:replace="${extraStyles} ?: ~{}"></th:block>

    <style>
        /* Custom Tab System */
        .nav-tabs-custom {
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 2rem;
            display: flex;
            gap: 1.5rem;
        }

        .nav-link-custom {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            padding: 0.75rem 0.5rem;
            font-weight: 500;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: none;
            background: none;
        }

        .nav-link-custom:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .nav-link-custom.active {
            color: #fff;
        }

        .nav-link-custom.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.5);
        }

        .tab-badge {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            padding: 0.1rem 0.5rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* HTMX Loading Indicator */
        .htmx-indicator {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            z-index: 9999;
            overflow: hidden;
        }

        .htmx-indicator::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            animation: htmx-loading 1.5s infinite linear;
        }

        @keyframes htmx-loading {
            0% {
                left: -100%;
            }

            100% {
                left: 100%;
            }
        }

        .htmx-request .htmx-indicator {
            display: block;
        }

        .htmx-request.htmx-indicator {
            display: block;
        }
    </style>
</head>

<body class="bg-dark text-white">
    <!-- HTMX Global Loading Indicator -->
    <div class="htmx-indicator" id="global-loader"></div>

    <!-- Header Fragment -->
    <div th:replace="fragments/header :: header"></div>

    <div class="d-flex">
        <!-- Sidebar Fragment -->
        <div th:replace="fragments/sidebar :: sidebar(activeMenu=${activeMenu})"></div>

        <!-- Main Content -->
        <main class="main-wrapper flex-grow-1">
            <div th:replace="${content}">
                <!-- Page specific content will be injected here -->
            </div>
            <!-- Footer Fragment -->
            <div th:replace="fragments/footer :: footer"></div>
        </main>
    </div>

    <!-- Footer moved inside main-wrapper -->

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Page Specific Scripts -->
    <th:block th:replace="${extraScripts} ?: ~{}"></th:block>

    <!-- HTMX Sidebar Active State Manager & Sidebar Toggle Logic -->
    <script>
        // 사이드바 상태 초기화 (페이지 로드 시 즉시 실행)
        (function() {
            const sidebarStatus = localStorage.getItem('sidebarStatus');
            if (sidebarStatus === 'collapsed') {
                document.body.classList.add('sidebar-collapsed');
            }
        })();

        document.addEventListener('DOMContentLoaded', function() {
            // CSRF 토큰 설정 (HTMX용)
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
            const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
            
            if (csrfHeader && csrfToken) {
                document.body.addEventListener('htmx:configRequest', (evt) => {
                    evt.detail.headers[csrfHeader] = csrfToken;
                });
            }

            // HTMX 디버깅 (필요 시 주석 해제)
            // htmx.logAll();

            // 사이드바 토글 기능
            const sidebarToggle = document.getElementById('sidebar-toggle');
            if (sidebarToggle) {
                sidebarToggle.addEventListener('click', function() {
                    document.body.classList.toggle('sidebar-collapsed');
                    
                    // 상태 저장
                    const isCollapsed = document.body.classList.contains('sidebar-collapsed');
                    localStorage.setItem('sidebarStatus', isCollapsed ? 'collapsed' : 'expanded');
                });
            }

            // HTMX 페이지 전환 시 내비게이션 활성화 상태 관리
            document.addEventListener('htmx:pushedIntoHistory', function (evt) {
                const newPath = evt.detail.path;
                updateActiveLink(newPath);
            });

            // HTMX 요청 직시 스크롤 최상단 이동 (바닥 찍는 현상 방지)
            document.addEventListener('htmx:beforeRequest', function(evt) {
                if (evt.detail.target && evt.detail.target.id === 'page-content') {
                    window.scrollTo({ top: 0, behavior: 'instant' });
                }
            });

            function updateActiveLink(path) {
                document.querySelectorAll('.sidebar .nav-link').forEach(link => {
                    link.classList.remove('active');
                    const href = link.getAttribute('href');
                    if (href !== '#' && href !== '/' && path.startsWith(href)) {
                        link.classList.add('active');
                    } else if (href === '/' && path === '/') {
                        link.classList.add('active');
                    }
                });
            }

            // HTMX 글로벌 보안 설정 (CSRF)
            document.body.addEventListener('htmx:configRequest', (evt) => {
                const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
                if (csrfToken && csrfHeader) {
                    evt.detail.headers[csrfHeader] = csrfToken;
                }
            });
        });
    </script>
</body>

</html>

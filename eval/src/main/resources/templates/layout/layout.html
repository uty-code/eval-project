<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content, activeMenu, extraStyles, extraScripts)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">EES - 사원 평가 시스템</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <!-- Page Specific CSS -->
    <th:block th:replace="${extraStyles} ?: ~{}"></th:block>
</head>

<body>

    <!-- Header Fragment -->
    <div th:replace="fragments/header :: header"></div>

    <div class="d-flex">
        <!-- Sidebar Fragment -->
        <div th:replace="fragments/sidebar :: sidebar(activeMenu=${activeMenu})"></div>

        <!-- Main Content -->
        <main class="main-wrapper flex-grow-1">
            <div th:replace="${content}">
                <!-- Page specific content will be injected here -->
            </div>
        </main>
    </div>

    <!-- Footer Fragment -->
    <div th:replace="fragments/footer :: footer"></div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Page Specific Scripts -->
    <th:block th:replace="${extraScripts} ?: ~{}"></th:block>
</body>

</html>

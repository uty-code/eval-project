<html xmlns:th="http://www.thymeleaf.org">
<!-- 탭 네비게이션 조각 (Tab Navigation Fragment) -->
<div th:fragment="tab-nav(activeTab)" class="nav-tabs-custom mb-3">
    <!-- 사원 목록 탭 -->
    <a href="javascript:void(0)" class="nav-link-custom" 
       th:classappend="${activeTab == 'list'} ? 'active' : ''"
       hx-get="/employees" hx-target="#page-content" hx-select="#page-content" hx-swap="outerHTML" hx-push-url="true">
        <i class="bi bi-people-fill"></i> 사원 목록
    </a>
    
    <!-- 승인 대기 탭 -->
    <a href="javascript:void(0)" class="nav-link-custom" 
       th:classappend="${activeTab == 'pending'} ? 'active' : ''"
       hx-get="/employees/pending" hx-target="#page-content" hx-select="#page-content" hx-swap="outerHTML" hx-push-url="true">
        <i class="bi bi-person-plus-fill"></i> 승인 대기
        <span class="tab-badge" th:if="${pendingCount != null and pendingCount > 0}" th:text="${pendingCount}">0</span>
    </a>
    
    <!-- 신규 사원 등록 탭 -->
    <a th:href="@{/employees/new}" class="nav-link-custom"
       th:classappend="${activeTab == 'new'} ? 'active' : ''">
        <i class="bi bi-person-plus-fill"></i> 신규 사원 등록
    </a>
    
    <!-- 계정 잠금 탭 -->
    <a href="javascript:void(0)" class="nav-link-custom" 
       th:classappend="${activeTab == 'locked'} ? 'active' : ''"
       hx-get="/employees/locked" hx-target="#page-content" hx-select="#page-content" hx-swap="outerHTML" hx-push-url="true">
        <i class="bi bi-lock-fill"></i> 계정 잠금
        <span class="tab-badge" th:if="${lockedCount != null and lockedCount > 0}" th:text="${lockedCount}"
              style="background:rgba(239,68,68,0.2);color:#f87171;">0</span>
    </a>
</div>
</html>

<html xmlns:th="http://www.thymeleaf.org">
<!-- 통계 카드 조각 (Stats Row Fragment) -->
<div th:fragment="stats-row" class="row g-3 mb-4">
    <!-- 전체 사원 수 -->
    <div class="col">
        <div class="glass-card p-3 d-flex align-items-center gap-3">
            <div class="rounded-circle d-flex align-items-center justify-content-center"
                 style="width:46px;height:46px;background:rgba(99,102,241,0.15);">
                <i class="bi bi-people-fill text-primary fs-5"></i>
            </div>
            <div>
                <div class="text-muted small">전체 사원 수</div>
                <div class="fw-bold fs-4" th:text="${totalEmployeeCount}">0</div>
            </div>
        </div>
    </div>
    <!-- 재직 중 -->
    <div class="col">
        <div class="glass-card p-3 d-flex align-items-center gap-3">
            <div class="rounded-circle d-flex align-items-center justify-content-center"
                 style="width:46px;height:46px;background:rgba(16,185,129,0.15);">
                <i class="bi bi-person-check-fill text-success fs-5"></i>
            </div>
            <div>
                <div class="text-muted small">재직 중</div>
                <div class="fw-bold fs-4" th:text="${activeCount}">0</div>
            </div>
        </div>
    </div>
    <!-- 올해 입사자 -->
    <div class="col">
        <div class="glass-card p-3 d-flex align-items-center gap-3">
            <div class="rounded-circle d-flex align-items-center justify-content-center"
                 style="width:46px;height:46px;background:rgba(186,104,200,0.15);">
                <i class="bi bi-person-badge-fill text-purple fs-5" style="color: #a855f7;"></i>
            </div>
            <div>
                <div class="text-muted small">올해 입사자</div>
                <div class="fw-bold fs-4" th:text="${thisYearHired}">0</div>
            </div>
        </div>
    </div>
    <!-- 승인 대기 -->
    <div class="col">
        <div class="glass-card p-3 d-flex align-items-center gap-3">
            <div class="rounded-circle d-flex align-items-center justify-content-center"
                 style="width:46px;height:46px;background:rgba(245,158,11,0.15);">
                <i class="bi bi-hourglass-split text-warning fs-5"></i>
            </div>
            <div>
                <div class="text-muted small">승인 대기</div>
                <div class="fw-bold fs-4" th:text="${pendingCount}">0</div>
            </div>
        </div>
    </div>
    <!-- 계정 잠금 -->
    <div class="col">
        <div class="glass-card p-3 d-flex align-items-center gap-3"
             style="border-color:rgba(239,68,68,0.3);">
            <div class="rounded-circle d-flex align-items-center justify-content-center"
                 style="width:46px;height:46px;background:rgba(239,68,68,0.15);">
                <i class="bi bi-lock-fill fs-5" style="color:#f87171;"></i>
            </div>
            <div>
                <div class="text-muted small">계정 잠금</div>
                <div class="fw-bold fs-4" style="color:#f87171;" th:text="${lockedCount}">0</div>
            </div>
        </div>
    </div>
</div>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - EES 사원 평가 시스템</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body class="login-container">

    <div class="login-card glass-card text-center animate-fade-in">
        <div class="mb-4">
            <div class="d-inline-flex bg-primary bg-opacity-10 p-3 rounded-4 mb-3">
                <i class="bi bi-rocket-takeoff-fill text-primary fs-1"></i>
            </div>
            <h2 class="fw-bold text-white mb-1">EES Login</h2>
            <p class="text-muted small">Employee Evaluation System Access</p>
        </div>

        <!-- 로그인 에러 메시지 처리 -->
        <div th:if="${param.error}" class="alert alert-danger bg-danger bg-opacity-10 border-danger border-opacity-25 text-danger small mb-4">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:if="${#strings.equals(param.error, 'retired')}">퇴사 처리된 계정입니다.</span>
            <span th:if="${#strings.equals(param.error, 'locked')}">5회 이상 틀렸습니다. 관리자에게 문의해주세요</span>
            <span th:if="${#strings.equals(param.error, 'pending')}">승인 대기 중인 계정입니다. 관리자 승인 후 로그인할 수 있습니다.</span>
            <span th:unless="${#strings.equals(param.error, 'retired') or #strings.equals(param.error, 'locked') or #strings.equals(param.error, 'pending')}">아이디 또는 비밀번호가 올바르지 않습니다.</span>
        </div>

        <!-- 로그아웃 메시지 처리 -->
        <div th:if="${param.logout}" class="alert alert-success bg-success bg-opacity-10 border-success border-opacity-25 text-success small mb-4">
            <i class="bi bi-check-circle-fill me-2"></i> 성공적으로 로그아웃되었습니다.
        </div>

        <form th:action="@{/login}" method="post" class="text-start">
            <div class="mb-3">
                <label for="username" class="form-label text-muted small px-1">사원 번호</label>
                <div class="input-group">
                    <span class="input-group-text bg-surface-light border-0 text-muted"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Employee ID" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <div class="d-flex justify-content-between">
                    <label for="password" class="form-label text-muted small px-1">비밀번호</label>
                    <a href="#" class="text-primary text-decoration-none small">비밀번호 찾기</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text bg-surface-light border-0 text-muted"><i class="bi bi-shield-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-3">
                로그인하기 <i class="bi bi-arrow-right ms-2"></i>
            </button>

            <div class="d-flex align-items-center my-3">
                <hr class="flex-grow-1 border-secondary opacity-25">
                <span class="text-muted small px-3">또는</span>
                <hr class="flex-grow-1 border-secondary opacity-25">
            </div>

            <a th:href="@{/register}" class="btn btn-outline-light w-100 mb-2" id="btn-go-register">
                <i class="bi bi-person-plus me-2"></i>사원 등록 신청
            </a>
            <p class="text-muted text-center mb-0" style="font-size:0.72rem;">
                신청 후 관리자 승인을 받아야 로그인이 가능합니다.
            </p>
        </form>

        <p class="text-muted mt-4 mb-0" style="font-size: 0.75rem;">
            &copy; 2026 Admin Portal. All rights reserved.
        </p>
    </div>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
    </style>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/layout :: layout(~{::title}, ~{::#page-content}, 'settings', ~{}, ~{})}">

<head>
    <title>비밀번호 변경 - EES 사원 평가 시스템</title>
</head>

<body>
    <div id="page-content" class="container-fluid py-4" data-bs-theme="dark">
        <!-- Page Header -->
        <div class="row align-items-center mb-4">
            <div class="col">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-2">
                        <li class="breadcrumb-item">
                            <a th:href="@{/}" class="text-primary text-decoration-none">대시보드</a>
                        </li>
                        <li class="breadcrumb-item active text-muted">내 설정</li>
                    </ol>
                </nav>
                <h1 class="fw-bold fs-3 mb-0"><i class="bi bi-gear-fill me-2 text-primary"></i>내 설정</h1>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">

                <!-- 알림 메시지 -->
                <div th:if="${successMessage}"
                    class="alert alert-success border-0 mb-4 d-flex align-items-center gap-2"
                    style="background: rgba(34,197,94,0.15); color: #4ade80; border-left: 3px solid #4ade80 !important; border-left-style: solid !important;"
                    role="alert">
                    <i class="bi bi-check-circle-fill fs-5"></i>
                    <span th:text="${successMessage}"></span>
                </div>
                <div th:if="${errorMessage}"
                    class="alert alert-danger border-0 mb-4 d-flex align-items-center gap-2"
                    style="background: rgba(239,68,68,0.15); color: #f87171; border-left: 3px solid #f87171 !important; border-left-style: solid !important;"
                    role="alert">
                    <i class="bi bi-exclamation-triangle-fill fs-5"></i>
                    <span th:text="${errorMessage}"></span>
                </div>

                <!-- 설정 탭 -->
                <div class="glass-card p-4 p-md-5">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="bg-primary bg-opacity-25 rounded-circle d-flex align-items-center justify-content-center"
                            style="width:48px;height:48px;">
                            <i class="bi bi-shield-lock-fill text-primary fs-5"></i>
                        </div>
                        <div>
                            <h5 class="fw-bold mb-0">비밀번호 변경</h5>
                            <p class="text-muted small mb-0">보안을 위해 주기적으로 비밀번호를 변경하세요.</p>
                        </div>
                    </div>

                    <hr class="border-secondary opacity-25 mb-4">

                    <form th:action="@{/settings/password}" method="post" id="password-form" class="needs-validation"
                        novalidate>
                        <div class="row g-4">

                            <!-- 현재 비밀번호 -->
                            <div class="col-12">
                                <label for="currentPassword" class="form-label text-muted small fw-semibold">
                                    현재 비밀번호 <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <input type="password"
                                        class="form-control bg-dark bg-opacity-25 border-secondary border-opacity-50 text-white"
                                        id="currentPassword" name="currentPassword" required minlength="4"
                                        placeholder="현재 사용 중인 비밀번호를 입력하세요">
                                    <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('currentPassword', this)"
                                        title="비밀번호 표시/숨기기">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <div class="invalid-feedback">현재 비밀번호를 입력해 주세요.</div>
                            </div>

                            <!-- 새 비밀번호 -->
                            <div class="col-12">
                                <label for="newPassword" class="form-label text-muted small fw-semibold">
                                    새 비밀번호 <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <input type="password"
                                        class="form-control bg-dark bg-opacity-25 border-secondary border-opacity-50 text-white"
                                        id="newPassword" name="newPassword" required minlength="4"
                                        placeholder="새 비밀번호 (최소 4자 이상)">
                                    <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('newPassword', this)"
                                        title="비밀번호 표시/숨기기">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <div class="invalid-feedback">새 비밀번호는 최소 4자 이상이어야 합니다.</div>
                                <!-- 비밀번호 강도 표시 -->
                                <div class="mt-2" id="strength-container" style="display:none;">
                                    <div class="d-flex gap-1 mb-1">
                                        <div class="flex-fill rounded" style="height:4px;" id="str-bar-1"></div>
                                        <div class="flex-fill rounded" style="height:4px;" id="str-bar-2"></div>
                                        <div class="flex-fill rounded" style="height:4px;" id="str-bar-3"></div>
                                        <div class="flex-fill rounded" style="height:4px;" id="str-bar-4"></div>
                                    </div>
                                    <small id="strength-label" class="text-muted"></small>
                                </div>
                            </div>

                            <!-- 새 비밀번호 확인 -->
                            <div class="col-12">
                                <label for="confirmPassword" class="form-label text-muted small fw-semibold">
                                    새 비밀번호 확인 <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <input type="password"
                                        class="form-control bg-dark bg-opacity-25 border-secondary border-opacity-50 text-white"
                                        id="confirmPassword" name="confirmPassword" required minlength="4"
                                        placeholder="새 비밀번호를 다시 입력하세요">
                                    <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('confirmPassword', this)"
                                        title="비밀번호 표시/숨기기">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <div id="confirm-feedback" class="form-text mt-1" style="display:none;"></div>
                            </div>

                        </div>

                        <!-- 안내 문구 -->
                        <div class="mt-4 p-3 rounded-3"
                            style="background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2);">
                            <p class="text-muted small mb-1"><i class="bi bi-info-circle me-1 text-primary"></i>비밀번호 설정 안내</p>
                            <ul class="text-muted small mb-0 ps-3">
                                <li>최소 4자 이상 입력하세요.</li>
                                <li>타인이 추측하기 어려운 비밀번호를 사용하세요.</li>
                                <li>변경 후 자동으로 세션에 반영됩니다.</li>
                            </ul>
                        </div>

                        <!-- 버튼 -->
                        <div class="d-flex justify-content-end gap-2 mt-5">
                            <a th:href="@{/}" class="btn btn-outline-secondary px-4">취소</a>
                            <button type="submit" class="btn btn-primary px-4" id="submit-btn">
                                <i class="bi bi-shield-check me-2"></i>비밀번호 변경
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>

        <script>
            // 비밀번호 표시/숨기기 토글
            function togglePassword(inputId, btn) {
                const input = document.getElementById(inputId);
                const icon = btn.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.className = 'bi bi-eye-slash';
                } else {
                    input.type = 'password';
                    icon.className = 'bi bi-eye';
                }
            }

            // 비밀번호 강도 측정
            const newPasswordInput = document.getElementById('newPassword');
            const strengthContainer = document.getElementById('strength-container');
            const strengthLabel = document.getElementById('strength-label');
            const bars = [
                document.getElementById('str-bar-1'),
                document.getElementById('str-bar-2'),
                document.getElementById('str-bar-3'),
                document.getElementById('str-bar-4'),
            ];

            newPasswordInput.addEventListener('input', function () {
                const val = this.value;
                if (!val) {
                    strengthContainer.style.display = 'none';
                    return;
                }
                strengthContainer.style.display = 'block';

                let score = 0;
                if (val.length >= 4) score++;
                if (val.length >= 8) score++;
                if (/[A-Z]/.test(val) || /[0-9]/.test(val)) score++;
                if (/[^A-Za-z0-9]/.test(val)) score++;

                const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
                const labels = ['매우 약함', '약함', '보통', '강함'];
                bars.forEach((bar, i) => {
                    bar.style.backgroundColor = i < score ? colors[score - 1] : 'rgba(255,255,255,0.1)';
                });
                strengthLabel.textContent = '강도: ' + labels[score - 1];
                strengthLabel.style.color = colors[score - 1];
            });

            // 비밀번호 확인 실시간 검증
            const confirmInput = document.getElementById('confirmPassword');
            const confirmFeedback = document.getElementById('confirm-feedback');
            confirmInput.addEventListener('input', function () {
                if (!this.value) {
                    confirmFeedback.style.display = 'none';
                    return;
                }
                confirmFeedback.style.display = 'block';
                if (this.value === newPasswordInput.value) {
                    confirmFeedback.textContent = '✓ 비밀번호가 일치합니다.';
                    confirmFeedback.style.color = '#4ade80';
                } else {
                    confirmFeedback.textContent = '✗ 비밀번호가 일치하지 않습니다.';
                    confirmFeedback.style.color = '#f87171';
                }
            });

            // 폼 제출 전 최종 검증
            document.getElementById('password-form').addEventListener('submit', function (e) {
                const np = document.getElementById('newPassword').value;
                const cp = document.getElementById('confirmPassword').value;
                if (np !== cp) {
                    e.preventDefault();
                    confirmFeedback.textContent = '✗ 비밀번호가 일치하지 않습니다.';
                    confirmFeedback.style.color = '#f87171';
                    confirmFeedback.style.display = 'block';
                    confirmInput.focus();
                }
            });
        </script>
    </div>
</body>

</html>

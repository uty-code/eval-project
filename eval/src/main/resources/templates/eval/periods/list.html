<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: layout(~{::title}, ~{::#page-content}, 'periods', ~{}, ~{::#page-scripts})}">
<head>
    <title>평가 차수 설정 - EES 사원 평가 시스템</title>
</head>
<body>

    <div id="page-content" class="container-fluid py-4">
        <!-- Page Header -->
        <div class="row align-items-center mb-4">
            <div class="col-md-8">
                <h1 class="fw-bold fs-3 mb-1">평가 차수 설정</h1>
                <p class="text-muted">평가 기간(차수)을 생성하고 상태를 관리합니다.</p>
            </div>
            <div class="col-md-4 text-md-end">
                <a th:href="@{/eval/periods/new}" class="btn btn-primary px-4">
                    <i class="bi bi-plus-circle me-2"></i>신규 차수 생성
                </a>
            </div>
        </div>

        <!-- Flash Messages -->
        <div th:if="${successMessage}" class="alert alert-success bg-success bg-opacity-10 border-success border-opacity-25 text-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger bg-danger bg-opacity-10 border-danger border-opacity-25 text-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Period Table -->
        <div class="glass-card p-4">
            <div class="table-responsive">
                <table class="table table-hover table-dark-custom align-middle mb-0" id="periods-table">
                    <thead>
                        <tr class="text-muted small border-bottom border-secondary opacity-50">
                            <th class="py-3">연도</th>
                            <th class="py-3">차수명</th>
                            <th class="py-3">시작일</th>
                            <th class="py-3">종료일</th>
                            <th class="py-3">상태</th>
                            <th class="py-3 text-center">관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 데이터가 없을 경우 -->
                        <tr th:if="${#lists.isEmpty(periods)}">
                            <td colspan="6" class="text-center text-muted py-5">
                                <i class="bi bi-inbox fs-1 d-block mb-3 opacity-50"></i>
                                등록된 평가 차수가 없습니다. 신규 차수를 생성해 주세요.
                            </td>
                        </tr>
                        <!-- 차수 목록 반복 -->
                        <tr th:each="period : ${periods}" th:id="'period-' + ${period.periodId()}">
                            <td class="py-3" th:text="${period.periodYear()}">2026</td>
                            <td class="py-3 fw-semibold" th:text="${period.periodName()}">상반기 정기 평가</td>
                            <td class="py-3" th:text="${period.startDate()}">2026-04-01</td>
                            <td class="py-3" th:text="${period.endDate()}">2026-04-30</td>
                            <td class="py-3">
                                <!-- 상태 배지 렌더링 -->
                                <span th:switch="${period.statusCode()}">
                                    <span th:case="'PLANNED'" class="badge bg-secondary bg-opacity-10 text-secondary fw-normal px-3 py-2">
                                        <i class="bi bi-clock me-1"></i>계획
                                    </span>
                                    <span th:case="'IN_PROGRESS'" class="badge bg-primary bg-opacity-10 text-primary fw-normal px-3 py-2">
                                        <i class="bi bi-play-circle me-1"></i>진행 중
                                    </span>
                                    <span th:case="'COMPLETED'" class="badge bg-success bg-opacity-10 text-success fw-normal px-3 py-2">
                                        <i class="bi bi-check-circle me-1"></i>완료
                                    </span>
                                    <span th:case="'CLOSED'" class="badge bg-dark bg-opacity-25 text-white-50 fw-normal px-3 py-2">
                                        <i class="bi bi-lock me-1"></i>마감
                                    </span>
                                </span>
                            </td>
                            <td class="py-3 text-center">
                                <div class="d-flex gap-1 justify-content-center">
                                    <!-- 수정 버튼 (PLANNED 상태만) -->
                                    <a th:if="${period.statusCode() == 'PLANNED'}"
                                       th:href="@{'/eval/periods/' + ${period.periodId()} + '/edit'}"
                                       class="btn btn-sm btn-outline-light px-2" title="수정">
                                        <i class="bi bi-pencil-square"></i>
                                    </a>

                                    <!-- 상태 전이 버튼 -->
                                    <form th:if="${period.statusCode() == 'PLANNED'}"
                                          th:action="@{'/eval/periods/' + ${period.periodId()} + '/transition'}"
                                          method="post" class="d-inline">
                                        <input type="hidden" name="newStatus" value="IN_PROGRESS">
                                        <button type="submit" class="btn btn-sm btn-outline-primary px-2"
                                                title="평가 시작" onclick="return confirm('이 차수를 진행 상태로 변경하시겠습니까?');">
                                            <i class="bi bi-play-fill"></i>
                                        </button>
                                    </form>

                                    <form th:if="${period.statusCode() == 'IN_PROGRESS'}"
                                          th:action="@{'/eval/periods/' + ${period.periodId()} + '/transition'}"
                                          method="post" class="d-inline">
                                        <input type="hidden" name="newStatus" value="COMPLETED">
                                        <button type="submit" class="btn btn-sm btn-outline-success px-2"
                                                title="평가 완료" onclick="return confirm('이 차수를 완료 상태로 변경하시겠습니까?');">
                                            <i class="bi bi-check-lg"></i>
                                        </button>
                                    </form>

                                    <form th:if="${period.statusCode() == 'COMPLETED'}"
                                          th:action="@{'/eval/periods/' + ${period.periodId()} + '/transition'}"
                                          method="post" class="d-inline">
                                        <input type="hidden" name="newStatus" value="CLOSED">
                                        <button type="submit" class="btn btn-sm btn-outline-warning px-2"
                                                title="차수 마감" onclick="return confirm('이 차수를 마감하시겠습니까? 마감 후 변경이 불가능합니다.');">
                                            <i class="bi bi-lock"></i>
                                        </button>
                                    </form>

                                    <!-- 삭제 버튼 (PLANNED 상태만) -->
                                    <form th:if="${period.statusCode() == 'PLANNED'}"
                                          th:action="@{'/eval/periods/' + ${period.periodId()} + '/delete'}"
                                          method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-outline-danger px-2"
                                                title="삭제" onclick="return confirm('이 차수를 삭제하시겠습니까?');">
                                            <i class="bi bi-trash3"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 상태 전이 안내 카드 -->
        <div class="glass-card p-4 mt-4 bg-primary bg-opacity-10 border-primary border-opacity-25">
            <h6 class="fw-bold mb-3 text-primary"><i class="bi bi-info-circle me-2"></i>상태 전이 규칙</h6>
            <div class="d-flex align-items-center gap-2 flex-wrap text-muted small">
                <span class="badge bg-secondary bg-opacity-10 text-secondary px-3 py-2">계획</span>
                <i class="bi bi-arrow-right"></i>
                <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2">진행 중</span>
                <i class="bi bi-arrow-right"></i>
                <span class="badge bg-success bg-opacity-10 text-success px-3 py-2">완료</span>
                <i class="bi bi-arrow-right"></i>
                <span class="badge bg-dark bg-opacity-25 text-white-50 px-3 py-2">마감</span>
            </div>
            <p class="text-muted small mt-2 mb-0">※ 동시에 하나의 차수만 '진행 중' 상태일 수 있습니다. 기존 차수를 완료한 후 새로운 차수를 시작해 주세요.</p>
        </div>
    </div>

    <!-- Page Specific Scripts -->
    <div id="page-scripts">
        <script>
            // 알림 메시지 자동 꺼짐 (5초)
            document.addEventListener('DOMContentLoaded', function() {
                const alerts = document.querySelectorAll('.alert-dismissible');
                alerts.forEach(function(alert) {
                    setTimeout(function() {
                        const closeBtn = alert.querySelector('.btn-close');
                        if (closeBtn) closeBtn.click();
                    }, 5000);
                });
            });
        </script>
    </div>

</body>
</html>

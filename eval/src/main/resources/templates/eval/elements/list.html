<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/layout :: layout(~{::title}, ~{::#page-content}, 'elements', ~{::#page-styles}, ~{::#page-scripts})}">

<head>
    <title>평가 요소 관리 - EES</title>
    <th:block id="page-styles">
        <style>
            .premium-card {
                background: rgba(30, 32, 40, 0.6);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 12px;
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            }

            .type-weight-bar {
                background: rgba(255, 193, 7, 0.05);
                border-left: 4px solid #ffc107;
                padding: 20px;
                margin-bottom: 25px;
            }

            .form-control-custom {
                background: rgba(0, 0, 0, 0.2) !important;
                border: 1px solid rgba(255, 255, 255, 0.1) !important;
                color: #fff !important;
                border-radius: 6px;
            }

            .form-control-custom:focus {
                border-color: #4facfe !important;
                box-shadow: 0 0 8px rgba(79, 172, 254, 0.4);
            }

            .table-custom thead th {
                font-weight: 600;
                color: #888;
                text-transform: uppercase;
                font-size: 0.75rem;
                letter-spacing: 0.5px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                padding: 15px;
            }

            .table-custom tbody td {
                padding: 15px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                vertical-align: middle;
            }

            .badge-custom {
                padding: 5px 10px;
                border-radius: 4px;
                font-weight: 600;
                font-size: 0.7rem;
            }

            .bg-peer {
                background: rgba(255, 193, 7, 0.1);
                color: #ffc107;
            }

            .bg-performance {
                background: rgba(13, 110, 253, 0.1);
                color: #0d6efd;
            }

            .bg-competency {
                background: rgba(25, 135, 84, 0.1);
                color: #198754;
            }

            .bg-interview {
                background: rgba(108, 117, 125, 0.1);
                color: #adb5bd;
            }

            .bg-purple {
                background: rgba(111, 66, 193, 0.1);
                color: #6f42c1;
            }

            .bg-purple {
                background: rgba(111, 66, 193, 0.1);
                color: #6f42c1;
            }

            .text-gradient {
                background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .bg-dark-800 {
                background-color: #1e2028 !important;
            }

            .bg-dark-700 {
                background-color: #2a2d37 !important;
            }

            .hover-border-primary:hover {
                border-color: #4facfe !important;
            }

            .transition-all {
                transition: all 0.3s ease;
            }

            .bg-primary-soft {
                background-color: rgba(79, 172, 254, 0.1) !important;
            }
        </style>
    </th:block>
</head>

<body>
    <div id="page-content" class="container-fluid py-4" th:fragment="content">
        <style>
            .premium-card {
                background: rgba(30, 32, 40, 0.6);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 12px;
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            }

            .type-weight-bar {
                background: rgba(255, 193, 7, 0.05);
                border-left: 4px solid #ffc107;
                padding: 20px;
                margin-bottom: 25px;
            }

            .table-custom thead th {
                font-weight: 600;
                color: #888;
                text-transform: uppercase;
                font-size: 0.75rem;
                letter-spacing: 0.5px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                padding: 15px;
            }

            .table-custom tbody td {
                padding: 15px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                vertical-align: middle;
            }

            .badge-custom {
                padding: 5px 10px;
                border-radius: 4px;
                font-weight: 600;
                font-size: 0.7rem;
            }

            .bg-peer {
                background: rgba(255, 193, 7, 0.1);
                color: #ffc107;
            }

            .bg-performance {
                background: rgba(13, 110, 253, 0.1);
                color: #0d6efd;
            }

            .bg-competency {
                background: rgba(25, 135, 84, 0.1);
                color: #198754;
            }

            .bg-interview {
                background: rgba(108, 117, 125, 0.1);
                color: #adb5bd;
            }

            .bg-purple {
                background: rgba(111, 66, 193, 0.1);
                color: #6f42c1;
            }

            .text-gradient {
                background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .bg-dark-800 {
                background-color: #1e2028 !important;
            }

            .bg-dark-700 {
                background-color: #2a2d37 !important;
            }

            .hover-border-primary:hover {
                border-color: #4facfe !important;
            }

            .transition-all {
                transition: all 0.3s ease;
            }

            .bg-primary-soft {
                background-color: rgba(79, 172, 254, 0.1) !important;
            }
        </style>
        <!-- 알림 메시지 (Toast/Alert) -->
        <div th:if="${successMessage}"
            class="alert alert-success alert-dismissible fade show d-flex align-items-center mb-4" role="alert">
            <i class="bi bi-check-circle-fill fs-4 me-2"></i>
            <div th:text="${successMessage}" class="fw-bold">성공 메시지</div>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}"
            class="alert alert-danger alert-dismissible fade show d-flex align-items-center mb-4" role="alert">
            <i class="bi bi-exclamation-triangle-fill fs-4 me-2"></i>
            <div th:text="${errorMessage}" class="fw-bold">오류 메시지</div>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Title Section -->
        <div class="row align-items-center mb-4">
            <div class="col-md-6">
                <h1 class="fw-bold fs-3 mb-0">평가요소 관리</h1>
            </div>
            <div class="col-md-6 text-md-end">
                <form hx-get="/eval/elements" hx-target="#page-content" hx-swap="outerHTML" hx-trigger="change"
                    class="d-inline-flex gap-2" id="filterForm">
                    <select name="periodId" class="form-select form-select-sm bg-dark text-white border-secondary">
                        <option th:each="p : ${periods}" th:value="${p.periodId()}" th:text="${p.periodName()}"
                            th:selected="${selectedPeriod?.periodId() == p.periodId()}"></option>
                    </select>
                    <select name="deptId" class="form-select form-select-sm bg-dark text-white border-secondary">
                        <option value="">전사 공통</option>
                        <th:block th:each="d : ${departments}">
                            <!-- 상위부서 (본부): parentDeptId == null -->
                            <option th:if="${d.parentDeptId() == null}" th:value="${d.deptId()}"
                                th:text="'🏢 ' + ${d.deptName()}" th:selected="${selectedDeptId == d.deptId()}"
                                style="font-weight: 700; color: #a5b4fc;">
                            </option>
                            <!-- 하위부서 (팀): parentDeptId != null -->
                            <option th:unless="${d.parentDeptId() == null}" th:value="${d.deptId()}"
                                th:text="'　└ ' + ${d.deptName()}" th:selected="${selectedDeptId == d.deptId()}"
                                style="color: #94a3b8; padding-left: 1.5rem;">
                            </option>
                        </th:block>
                    </select>
                </form>
            </div>
        </div>
        <!-- 유형별 가중치 설정 바 (가로 나란히 배치) -->
        <div class="row g-4 mb-5">
            <!-- 부서원 설정 (비중 확대) -->
            <div class="col-xl-8">
                <div class="premium-card p-4 h-100">
                    <div class="mb-3">
                        <h5 class="fw-bold mb-1 text-white">부서원(Staff) 가중치 설정</h5>
                        <p class="text-secondary small mb-0">성과와 역량 비중 합계가 100%여야 합니다.</p>
                    </div>
                    <form hx-post="/eval/elements/type-weights" hx-target="#page-content" hx-swap="outerHTML">
                        <input type="hidden" name="periodId" th:value="${selectedPeriod.periodId()}">
                        <input type="hidden" name="deptId" th:value="${selectedDeptId}">
                        <input type="hidden" name="targetRoleCode" value="STAFF">

                        <div class="input-group input-group-photo shadow-sm">
                            <th:block th:each="weight, iterStat : ${memberWeights}">
                                <span class="input-group-text bg-dark-700 border-secondary text-white fw-bold px-3"
                                    th:text="${weight.elementTypeCode() == 'PERFORMANCE' ? '성과' : '역량'}"
                                    th:classappend="${iterStat.index > 0 ? 'border-start-0' : ''}">성과</span>
                                <input type="number" name="weights"
                                    th:value="${#numbers.formatDecimal(weight.weight(), 1, 0)}"
                                    th:id="'weight-' + ${weight.elementTypeCode()}"
                                    class="form-control bg-white text-dark text-center fw-bold border-secondary border-end-0 weight-input-sync"
                                    style="font-size: 1.1rem; max-width: 100px;" min="0" max="100">
                                <span
                                    class="input-group-text bg-white border-secondary border-start-0 text-secondary px-2">%</span>
                                <input type="hidden" name="types" th:value="${weight.elementTypeCode()}">
                            </th:block>
                            <button type="submit" class="btn btn-primary fw-bold px-4 border-secondary transition-all">
                                <i class="bi bi-check-lg me-1"></i>저장
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 부서장 가중치 정보 (축소 배치) -->
            <div class="col-xl-4">
                <div class="premium-card p-4 h-100" style="border-left: 4px solid #4facfe;">
                    <div class="mb-3">
                        <h5 class="fw-bold mb-1 text-gradient">부서장(Leader) 설정</h5>
                        <p class="text-secondary small mb-0">다면평가 100% 고정입니다.</p>
                    </div>
                    <div class="input-group input-group-photo shadow-sm d-flex">
                        <th:block th:each="weight : ${leaderWeights}">
                            <span
                                class="input-group-text bg-dark-700 border-secondary text-primary fw-bold px-3">다면</span>
                            <input type="number" th:value="${#numbers.formatDecimal(weight.weight(), 1, 0)}"
                                class="form-control bg-dark-800 text-white text-center fw-bold border-secondary border-end-0"
                                style="font-size: 1.1rem; max-width: 100px;" readonly disabled>
                            <span
                                class="input-group-text bg-dark-800 border-secondary border-start-0 text-secondary px-2">%</span>
                        </th:block>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- 2. 중앙 리스트 (75%) -->
            <div class="col-lg-9">
                <div class="premium-card p-4">
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-list-task me-2 text-primary"></i>
                            <h5 class="fw-bold mb-0">등록된 평가 기준(문항)</h5>
                        </div>
                        <form th:if="${selectedDeptId != null}" hx-post="/eval/elements/copy-common"
                            hx-target="#page-content" hx-swap="outerHTML"
                            hx-confirm="전사 공통 항목을 현재 부서로 가져오시겠습니까? (현재 부서에 이미 있는 항목은 중복해서 가져오지 않습니다.)">
                            <input type="hidden" name="periodId" th:value="${selectedPeriod.periodId()}">
                            <input type="hidden" name="deptId" th:value="${selectedDeptId}">
                            <button type="submit" class="btn btn-sm btn-outline-info fw-bold rounded-pill px-3">
                                <i class="bi bi-cloud-download me-1"></i> 전사공통 불러오기
                            </button>
                        </form>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-custom text-white">
                            <thead>
                                <tr>
                                    <th>유형</th>
                                    <th>요소명 (지표)</th>
                                    <th class="text-center">가중치 (%)</th>
                                    <th class="text-center">관리</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="el : ${elements}" th:data-type="${el.elementTypeCode()}"
                                    th:data-weight="${el.weight()}">
                                    <td>
                                        <span th:if="${el.elementTypeCode() == 'PERFORMANCE'}"
                                            class="badge-custom bg-performance">성과</span>
                                        <span th:if="${el.elementTypeCode() == 'COMPETENCY'}"
                                            class="badge-custom bg-competency">역량</span>
                                        <span th:if="${el.elementTypeCode() == 'PEER'}"
                                            class="badge-custom bg-peer">다면</span>
                                        <span th:if="${el.elementTypeCode() == 'INTERVIEW'}"
                                            class="badge-custom bg-interview">면담</span>
                                        <span th:if="${el.elementTypeCode() == 'MULTI_DIMENSIONAL'}"
                                            class="badge-custom bg-purple">다면</span>
                                    </td>
                                    <td class="fw-medium" th:text="${el.elementName()}">요소명</td>
                                    <td class="text-center text-primary fw-bold"
                                        th:text="${#numbers.formatDecimal(el.weight(), 1, 0) + '%'}">0%</td>
                                    <td class="text-center">
                                        <form th:attr="hx-post=@{/eval/elements/{id}/delete(id=${el.elementId()})}"
                                            hx-target="#page-content" hx-swap="outerHTML" hx-confirm="항목을 삭제하시겠습니까?">
                                            <input type="hidden" name="periodId"
                                                th:value="${selectedPeriod.periodId()}">
                                            <input type="hidden" name="deptId" th:value="${selectedDeptId}">
                                            <button type="submit" class="btn btn-sm btn-outline-danger border-0">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(elements)}">
                                    <td colspan="4" class="text-center py-5 text-muted">등록된 문항이 없습니다.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 3. 우측 추가 폼 (25%) -->
            <div class="col-lg-3">
                <div class="premium-card p-4">
                    <div class="d-flex align-items-center mb-4">
                        <i class="bi bi-plus-circle-fill me-2 text-primary"></i>
                        <h5 class="fw-bold mb-0">평가요소 추가</h5>
                    </div>
                    <form hx-post="/eval/elements" hx-target="#page-content" hx-swap="outerHTML">
                        <input type="hidden" name="periodId" th:value="${selectedPeriod?.periodId()}">
                        <input type="hidden" name="deptId" th:value="${selectedDeptId}">
                        <input type="hidden" name="maxScore" value="100">

                        <div class="mb-4">
                            <label class="form-label small text-muted">평가 유형</label>
                            <select name="elementTypeCode" id="newElementType" class="form-select form-control-custom"
                                required>
                                <option value="PERFORMANCE">성과 평가</option>
                                <option value="COMPETENCY">역량 평가</option>
                                <option value="PEER">다면 평가</option>
                                <option value="INTERVIEW">면담 평가</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small text-muted">평가요소명</label>
                            <input type="text" name="elementName" class="form-control form-control-custom"
                                placeholder="예: 의사소통 및 협업" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small text-muted">가중치 (%)</label>
                            <input type="number" name="weight" id="newElementWeight"
                                class="form-control form-control-custom" placeholder="30" step="1" required>
                            <div id="weightFeedback" class="form-text small mt-1"></div>
                        </div>

                        <button type="submit" id="submitElementBtn"
                            class="btn btn-primary w-100 py-2 fw-bold shadow-sm mt-2">
                            추가하기
                        </button>
                    </form>
                </div>

                <!-- Quick Reset / Tooltips -->
                <div class="premium-card p-3 mt-4">
                    <p class="x-small text-muted mb-1">
                        <i class="bi bi-info-circle me-1"></i>
                        각 유형(Type) 내 문항 가중치의 합계는 100%여야 최종 점수가 정상 산출됩니다.
                    </p>
                    <div id="typeSummary" class="mt-2 pt-2 border-top border-secondary border-opacity-10">
                        <!-- JS로 채워짐 -->
                    </div>
                </div>
            </div>
        </div>
        <!-- HTMX 교체 시에도 무조건 실행되도록 fragment 내부에 스크립트 배치 -->
        <script th:inline="javascript">
            (function () {
                // 1. 역할별 가중치 실시간 밸런싱 (body에 딱 한 번만 위임하여 영구 생존)
                if (!document.body.dataset.weightSyncBound) {
                    document.body.dataset.weightSyncBound = 'true';
                    document.body.addEventListener('input', function (e) {
                        if (e.target.id === 'weight-PERFORMANCE') {
                            const compInput = document.getElementById('weight-COMPETENCY');
                            if (compInput) {
                                let val = parseInt(e.target.value) || 0;
                                val = Math.max(0, Math.min(100, val));
                                e.target.value = val;
                                compInput.value = 100 - val;
                            }
                        } else if (e.target.id === 'weight-COMPETENCY') {
                            const perfInput = document.getElementById('weight-PERFORMANCE');
                            if (perfInput) {
                                let val = parseInt(e.target.value) || 0;
                                val = Math.max(0, Math.min(100, val));
                                e.target.value = val;
                                perfInput.value = 100 - val;
                            }
                        }
                    });
                }

                // 2. 가중치 요약 및 하단 폼 검증 (교체될 때마다 실행)
                const updateSummaryAndValidation = () => {
                    const typeWeights = {};
                    // 화면의 표에서 직접 데이터 추출
                    const rows = document.querySelectorAll('tr[data-weight]');
                    rows.forEach(row => {
                        const type = row.getAttribute('data-type');
                        const weight = Number(row.getAttribute('data-weight')) || 0;
                        typeWeights[type] = (typeWeights[type] || 0) + weight;
                    });

                    // 하단 요약(Summary) 업데이트
                    const summary = document.getElementById('typeSummary');
                    const typeNames = { 'PERFORMANCE': '성과', 'COMPETENCY': '역량', 'PEER': '다면', 'MULTI_DIMENSIONAL': '다면' };
                    if (summary) {
                        let summaryHtml = '';
                        ['PERFORMANCE', 'COMPETENCY', 'PEER'].forEach(t => {
                            const s = typeWeights[t] || 0;
                            const color = s === 100 ? 'text-success' : (s > 100 ? 'text-danger' : 'text-warning');
                            summaryHtml += `<div class="d-flex justify-content-between x-small mb-1">
                                <span>${typeNames[t]} 합계:</span>
                                <span class="${color} fw-bold">${s}%</span>
                            </div>`;
                        });
                        summary.innerHTML = summaryHtml;
                    }

                    // 폼 피드백 검증
                    const typeSelect = document.getElementById('newElementType');
                    const weightInput = document.getElementById('newElementWeight');
                    const feedback = document.getElementById('weightFeedback');
                    const submitBtn = document.getElementById('submitElementBtn');

                    if (typeSelect && weightInput && feedback) {
                        const selectedType = typeSelect.value;
                        const inputWeight = parseFloat(weightInput.value) || 0;
                        const currentSum = typeWeights[selectedType] || 0;
                        const remaining = 100 - currentSum;

                        if (currentSum >= 100) {
                            feedback.innerHTML = `<span class="text-danger"><i class="bi bi-exclamation-triangle"></i> [${typeNames[selectedType]}] 가중치 합계가 이미 100%입니다.</span>`;
                            if (submitBtn) submitBtn.disabled = true;
                        } else if (inputWeight > remaining) {
                            feedback.innerHTML = `<span class="text-danger"><i class="bi bi-x-circle"></i> 남은 가중치(${remaining}%)를 초과했습니다.</span>`;
                            if (submitBtn) submitBtn.disabled = true;
                        } else {
                            feedback.innerHTML = `<span class="text-info"><i class="bi bi-info-circle"></i> 현재 [${typeNames[selectedType]}] 잔여 가중치: <strong>${remaining}%</strong></span>`;
                            if (submitBtn) submitBtn.disabled = false;
                        }
                    }
                };

                // 즉시 1회 실행
                updateSummaryAndValidation();

                // 입력 이벤트 바인딩
                const typeSelect = document.getElementById('newElementType');
                const weightInput = document.getElementById('newElementWeight');
                if (typeSelect) typeSelect.onchange = updateSummaryAndValidation;
                if (weightInput) weightInput.oninput = updateSummaryAndValidation;
            })();
        </script>
    </div>

    <th:block id="page-scripts">
    </th:block>
</body>

</html>

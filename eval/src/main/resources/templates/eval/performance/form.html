<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: layout(~{::title}, ~{::#page-content}, 'performance-eval', ~{::style}, ~{})}">
<head>
    <title>자가평가 작성 - EES</title>
    <style></style>
</head>
<body>
<div id="page-content" class="container-fluid py-4">
    <style>
        .eval-form-container { max-width: 1200px; margin: 0 auto; }
        .eval-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 8px;
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--primary);
            padding: 24px 30px;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .eval-card.submitted {
            border-left-color: #22c55e;
        }
        .eval-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .eval-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .eval-title i { color: #818cf8; }
        .weight-badge {
            background-color: rgba(255,255,255,0.05);
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 4px;
        }
        .field-label {
            color: #818cf8;
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .eval-textarea {
            width: 100%;
            border: 1px solid var(--glass-border);
            background-color: rgba(0,0,0,0.15);
            border-radius: 6px;
            padding: 14px 16px;
            font-size: 0.95rem;
            color: var(--text-main);
            min-height: 120px;
            resize: vertical;
        }
        .eval-textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: rgba(0,0,0,0.25);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
        }
        .eval-textarea::placeholder { color: var(--text-muted); }
        .eval-textarea:read-only {
            background-color: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.08);
            color: var(--text-muted);
            cursor: default;
            resize: none;
        }
        .submitted-view {
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.25);
            border-radius: 8px;
            padding: 14px 18px;
            font-size: 0.95rem;
            color: #d1fae5;
            min-height: 80px;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.7;
        }
        .empty-comment {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.9rem;
        }
        .header-section {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 24px;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3);
        }
        .submitted-banner {
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 8px;
            padding: 14px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #86efac;
            font-weight: 600;
        }
        .success-toast {
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.35);
            border-radius: 8px;
            padding: 12px 18px;
            margin-bottom: 16px;
            color: #86efac;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-submit {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79,70,229,0.4);
        }
        .btn-resubmit {
            background-color: rgba(79,70,229,0.2);
            color: #a5b4fc;
            border: 1px solid rgba(79,70,229,0.4);
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-resubmit:hover {
            background-color: rgba(79,70,229,0.35);
            color: white;
        }
        .btn-back {
            background-color: rgba(255,255,255,0.05);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-back:hover {
            background-color: rgba(255,255,255,0.1);
            color: white;
        }
    </style>

    <div class="eval-form-container">

        <!-- 상단 헤더 -->
        <div class="header-section">
            <div>
                <h1 class="text-white fw-bold fs-4 mb-1">
                    <i class="bi bi-file-earmark-person text-primary me-2"></i>
                    <span th:text="${mapping.relationTypeCode() == 'SELF' ? '자가평가 작성' : '성과평가 수행'}">평가 작성</span>
                    <span th:if="${mapping != null}" class="fs-6 fw-normal text-muted ms-2">
                        - <span th:text="${mapping.evaluateeName()}"></span>
                    </span>
                </h1>
                <p class="text-muted mb-0 small" th:text="${mapping.relationTypeCode() == 'SELF' ? '본인의 성과와 업무 내역을 구체적으로 작성해 주세요.' : '피평가자의 성과와 자가평가 내용을 참고하여 객관적으로 평가해 주세요.'}">평가 안내 문구</p>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <a href="#" class="btn-back"
                   hx-get="/eval/performance" hx-target="#page-content" hx-select="#page-content" hx-swap="outerHTML show:window:top" hx-push-url="true">
                    <i class="bi bi-arrow-left"></i> 뒤로가기
                </a>
                <!-- 제출 전: 제출 버튼 -->
                <button th:if="${!submitted}" type="submit" form="evaluationForm" class="btn-submit">
                    <i class="bi bi-check2 me-1"></i> 평가 제출
                </button>
                <!-- 제출 후: 재작성 버튼 -->
                <button th:if="${submitted}" type="submit" form="evaluationForm" class="btn-resubmit">
                    <i class="bi bi-pencil me-1"></i> 내용 수정 후 재제출
                </button>
            </div>
        </div>

        <!-- 제출 성공 토스트 (Flash Attribute) -->
        <div th:if="${successMessage}" class="success-toast">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${successMessage}"></span>
        </div>

        <!-- 제출 완료 배너 -->
        <div th:if="${submitted}" class="submitted-banner">
            <i class="bi bi-patch-check-fill fs-5"></i>
            <span>평가가 제출된 상태입니다. 내용을 수정하여 재제출할 수 있습니다.</span>
        </div>

        <!-- 평가요소 없을 때 -->
        <div th:if="${elements == null || elements.isEmpty()}" class="glass-card text-center py-5">
            <i class="bi bi-exclamation-circle fs-1 text-warning mb-3 d-block"></i>
            <h5 class="text-white fw-bold">등록된 평가요소가 없습니다.</h5>
            <p class="text-muted">관리자가 해당 차수의 평가요소를 먼저 등록해야 합니다.</p>
        </div>

        <!-- 평가 폼 -->
        <form th:if="${elements != null && !elements.isEmpty()}" id="evaluationForm"
              th:action="@{/eval/performance/submit}" method="post">
            <input type="hidden" name="mappingId" th:value="${mappingId}">

            <div th:each="element : ${elements}"
                 th:class="${savedMap != null and savedMap.containsKey(element.elementId())} ? 'eval-card submitted' : 'eval-card'">
                <div class="eval-card-header">
                    <div class="eval-title">
                        <i class="bi bi-check-square"></i>
                        <span th:text="${element.elementName()}">평가 항목명</span>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <!-- 저장된 경우 완료 뱃지 표시 -->
                        <span th:if="${savedMap != null and savedMap.containsKey(element.elementId())}"
                              class="badge" style="background:rgba(34,197,94,0.2);color:#86efac;border:1px solid rgba(34,197,94,0.3);font-size:0.78rem;padding:4px 10px;">
                            <i class="bi bi-check2 me-1"></i>작성 완료
                        </span>
                        <div class="weight-badge">
                            가중치 <strong th:text="${element.weight() + '%'}">0%</strong>
                            &nbsp;|&nbsp; 만점 <strong th:text="${element.maxScore() + '점'}">0점</strong>
                        </div>
                    </div>
                </div>

                <!-- 피평가자 자가평가 내용 표시 (평가자 화면인 경우) -->
                <div th:if="${selfEvalMap != null and selfEvalMap.containsKey(element.elementId())}" class="mb-4">
                    <div class="field-label" style="color: #10b981;">
                        <i class="bi bi-person-check-fill"></i> 피평가자 자가평가 의견
                    </div>
                    <div class="submitted-view" 
                         th:text="${#strings.isEmpty(selfEvalMap.get(element.elementId())) ? '작성된 내용이 없습니다.' : selfEvalMap.get(element.elementId())}"
                         th:classappend="${#strings.isEmpty(selfEvalMap.get(element.elementId())) ? 'empty-comment' : ''}">
                    </div>
                </div>

                <!-- 점수 및 코멘트 입력 영역 -->
                <div class="row g-4">
                    <div class="col-md-3">
                        <div class="field-label">
                            <i class="bi bi-star-fill"></i> 점수 (만점: <span th:text="${element.maxScore()}"></span>점)
                        </div>
                        <input type="number" class="eval-textarea" style="min-height: 50px;"
                               th:name="'score_' + ${element.elementId()}"
                               th:value="${savedMap != null and savedMap.containsKey(element.elementId()) ? savedMap.get(element.elementId()).getScore() : ''}"
                               min="0" th:max="${element.maxScore()}" step="0.1" 
                               th:placeholder="${element.maxScore() + '점 만점'}"
                               required>
                    </div>
                    <div class="col-md-9">
                        <div class="field-label">
                            <i class="bi bi-pencil-fill"></i> <span th:text="${mapping.relationTypeCode() == 'SELF' ? '본인 성과 서술' : '평가 의견 작성'}">성과 서술</span>
                        </div>
                        <textarea class="eval-textarea"
                                  th:name="'comment_' + ${element.elementId()}"
                                  placeholder="구체적인 근거와 함께 의견을 작성해주세요."
                                  th:text="${savedMap != null and savedMap.containsKey(element.elementId()) ?
                                             savedMap.get(element.elementId()).getComments() : ''}"></textarea>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
</html>
